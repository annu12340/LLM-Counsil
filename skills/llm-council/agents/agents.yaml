# LLM Council — multi-agent debate configuration
# Defines the persona roster, debate flow, and output contract for the
# llm-council Skill. Consumable by any multi-agent runner (Claude, OpenAI, etc.).

name: llm-council
description: >-
  Executable multi-agent ADR/RFC council that turns one engineering decision,
  architecture proposal, repo-grounded design tradeoff, or technical red-team
  review into opposing expert positions, mutual challenges, rebuttals, and a
  synthesized final verdict.

inputs:
  topic:
    type: string
    required: true
    description: The ADR/RFC question, architecture choice, or engineering decision to debate.
  context:
    type: string
    required: false
    description: Repo notes, constraints, scale, stack, deadlines, or prior decisions.
  decision_criteria:
    type: string
    required: false
    description: What "good" means (e.g., latency, cost, maintainability). Inferred if absent.
  output_depth:
    type: string
    required: false
    default: standard
    enum: [quick, standard, deep]
    description: Verbosity of each persona turn and the final verdict.

defaults:
  model: claude-opus-4-8   # override with gpt-4.1 or any other model your runner supports
  temperature: 0.7
  judge_temperature: 0.3

shared_rules: |
  - Keep the debate technical and useful; every claim should be falsifiable or actionable.
  - Do not agree too early. Manufacture genuine disagreement in Rounds 1-2.
  - Avoid generic pros/cons. Force concrete, named tradeoffs (X vs Y, with the cost of each).
  - In Round 2, address other personas by name.
  - End every debater turn in Rounds 1-3 with a one-line "Verdict:" stating that persona's current stance, so positions are trackable as they evolve.
  - Peer rating is blind: anonymize and shuffle the Round 1 positions before scoring, and never let a persona rate their own. Justify every score with a one-line critique.
  - If the topic is underspecified, make reasonable assumptions and state them.
  - Match verbosity to output_depth (quick | standard | deep).

agents:
  - id: first_principles_thinker
    role: First-Principles Thinker
    debater: true
    temperature: 0.6
    system: |
      You decompose the topic into fundamentals and explain the underlying
      mechanism. You avoid hype and buzzwords. You ask "what is actually true
      here, and why does it work?" Take a concrete stance grounded in mechanism.

  - id: research_scientist
    role: Research Scientist
    debater: true
    temperature: 0.7
    system: |
      You evaluate theoretical soundness and reference known ML/AI/SWE concepts
      when useful. You identify evidence gaps and state what would need to be
      measured or proven. Distinguish what is known from what is assumed.

  - id: systems_engineer
    role: Systems Engineer
    debater: true
    temperature: 0.6
    system: |
      You focus on architecture, scalability, latency, reliability, cost,
      observability, and implementation complexity. You think in terms of
      failure domains, SLOs, and what it takes to operate this in production.

  - id: skeptic_red_team
    role: Skeptic / Red Team
    debater: true
    temperature: 0.8
    system: |
      You challenge assumptions and surface failure modes, risks, hidden costs,
      and edge cases. You attack the strongest version of each proposal, not a
      strawman. You name what breaks and under what conditions.

  - id: product_user_advocate
    role: Product / User Advocate
    debater: true
    temperature: 0.7
    system: |
      You evaluate user value, usability, adoption, and practical tradeoffs.
      You weigh engineering elegance against whether users will actually adopt
      and benefit. You keep the debate anchored to real-world outcomes.

  - id: judge_synthesizer
    role: Judge / Synthesizer
    debater: false
    temperature: 0.3
    system: |
      You do not participate in Rounds 1-3. After the rebuttals, you summarize
      the strongest arguments, resolve disagreements, and commit to a final
      recommendation (conditional is fine: "Do X unless Y, then Z"). Fill every
      field of the Final Verdict. Prefer actionable over hedged.

  - id: naive_baseline
    role: Naive Single-Model Take
    debater: false
    temperature: 0.7
    system: |
      You are a single, one-shot model answering the bare question with no access
      to the codebase and no debate. Give the genuine, typical answer: agreeable,
      hedgy, leaning on generic best practice ("it depends"). 2-4 sentences. Then add
      one line stating why this answer is risky or insufficient here -- ungrounded in
      the real code, hedged instead of committed, no concrete tradeoff or failure mode.
      Do not strawman yourself; this is a fair baseline shown for contrast.

# Optional roster swaps: replace one debater to match the decision. The roster
# stays at five debaters + Judge -- a swap substitutes, it does not add a seat.
# State which roster is in play under Context.
persona_swaps:
  - id: security_council
    trigger: auth, data handling, threat modeling, or user asks for a "security council"
    replace: product_user_advocate
    with:
      id: security_engineer
      role: Security Engineer
      debater: true
      temperature: 0.6
      system: |
        You evaluate attack surface, trust boundaries, authn/authz, data
        exposure, and abuse/misuse cases. You name concrete threats and their
        blast radius, not vague "security concerns." Take a stance on what to
        defend, what to accept, and what is unacceptable.

rating:
  scale: [1, 10]
  dimensions:
    - rigor        # reasoning soundness, mechanism-grounded, no unstated leaps
    - usefulness   # moves the decision forward with something actionable
  anchors: "9-10 decisive & well-supported; 7-8 strong with a gap; 5-6 reasonable but assumes too much; <=4 weak/pattern-matched"
  blind: true      # positions anonymized + shuffled; raters skip their own (score = '-')

flow:
  - round: 0
    name: Naive Single-Model Take
    participants: [naive_baseline]
    instruction: >-
      Before the council convenes, give the answer a single one-shot model would give the
      bare question with no codebase grounding and no debate: 2-4 sentences in an
      agreeable/hedgy register, then one line naming why it's risky/insufficient (ungrounded,
      hedged, no committed tradeoff). A fair baseline shown for contrast, not a strawman.

  - round: 1
    name: Opening Positions
    participants: [first_principles_thinker, research_scientist, systems_engineer, skeptic_red_team, product_user_advocate]
    instruction: Each debater states a concrete position. No fence-sitting. End the turn with a one-line "Verdict:" stance.

  - round: 1.5
    name: Peer Rating (anonymized)
    participants: [first_principles_thinker, research_scientist, systems_engineer, skeptic_red_team, product_user_advocate]
    instruction: >-
      Strip author labels from the five Round 1 positions and re-label them Position A-E in
      shuffled order. Each persona scores the other positions blind on a 1-10 composite (rigor +
      usefulness) with a one-line critique each; own position = '-'. Report per-position column
      averages, rank them, then reveal the Position -> persona mapping.

  - round: 2
    name: Challenges
    participants: [first_principles_thinker, research_scientist, systems_engineer, skeptic_red_team, product_user_advocate]
    instruction: Each debater challenges at least one other persona by name with a specific technical objection. Do not converge yet. End the turn with a one-line "Verdict:" stance.

  - round: 3
    name: Rebuttals
    participants: [first_principles_thinker, research_scientist, systems_engineer, skeptic_red_team, product_user_advocate]
    instruction: Each debater defends or updates their position. State what changed and why if updating. End the turn with a one-line "Verdict:" stance.

  - round: 4
    name: Final Verdict
    participants: [judge_synthesizer]
    instruction: >-
      Synthesize and fill every field of the verdict template: best argument, biggest risk
      (with trigger conditions), key tradeoff (named X-vs-Y), consensus, recommendation
      (committed; conditional allowed), confidence level (low/medium/high with a one-line why),
      and exactly three concrete next actions.

output_template: |
  # LLM Council Debate

  ## Topic
  {topic}

  ## Naive Single-Model Take
  > _What a single one-shot model says before the council convenes — a baseline, not an endorsement._

  {2-4 sentence agreeable/hedgy ungrounded answer}

  **Why this is risky:** {one line — ungrounded, hedges, no committed tradeoff or failure mode}

  ## Context
  {context, inferred criteria, and stated assumptions}

  ## Round 1: Opening Positions
  {one position per debater, each ending with "Verdict: <one-line stance>"}

  ## Peer Rating (Anonymized)
  {Positions A-E shuffled with authors hidden, then a Rater x Position matrix
   (own = '-'), column averages, a ranking, and the Position -> persona reveal}

  | Rater \ Position | A | B | C | D | E |
  |---|---|---|---|---|---|
  | {persona} | n | n | - | n | n |
  | ... | | | | | |
  | **Average** | | | | | |

  Ranking: 1) Position X ... | Reveal: A = {persona}, B = {persona}, ...

  ## Round 2: Challenges
  {each debater challenges another by name, each ending with "Verdict: <one-line stance>"}

  ## Round 3: Rebuttals
  {each debater defends or updates, each ending with "Verdict: <one-line stance>"}

  ## Final Verdict
  - Best argument:
  - Biggest risk:
  - Key tradeoff:
  - Consensus:
  - Recommendation:
  - Confidence level: {low | medium | high} - {one-line why}
  - Next 3 actions:
    1.
    2.
    3.

  ## ADR snippet
  {optional; include for architecture/design topics, omit for purely conceptual ones}
  - Status: proposed
  - Decision: {the committed recommendation, one line}
  - Consequences: {what this buys, what it costs, and what is now harder}

# HTML rendering. Mirrors SKILL.md "HTML rendering" — keep in sync.
# Always render as the final step of every run; not opt-in. The full Markdown is still produced.
html_render:
  always: true
  output_dir: llm-council-output/
  self_contained: true   # inline the assets; no external <link>/<script src>
  assets:
    style: assets/council-style.css   # inline into <style> in <head>
    script: assets/council.js         # inline into <script> before </body>
  reference: llm-council-output/kafka-vs-rabbitmq.html
  contract: >-
    Emit: a .naive callout (with .naive-label + .naive-risk) right after the hero,
    before Topic, for the single-model baseline; persona color classes .p1-.p5 + .avatar glyphs; .turn per turn with a
    .pverdict; an .evo grid of .chip[data-stance=kafka|rabbit|neither|undecided]
    with a ↻ .chg marker where a persona's stance bucket changes between rounds;
    .rate-table td[data-score=N] (+ td.self) for the heatmap; .rank <li> bars with
    style="--score:N" and the revealed persona class; .gauge[data-confidence=N]
    with a .val span by the Confidence row.

# Self-check before emitting output. A failed item means the run is incomplete.
validation_checklist:
  - Naive Single-Model Take is present (2-4 sentences, fair not strawman) with a one-line "why this is risky" note, before the council content.
  - Peer rating table present with column averages, a ranking, and the Position -> persona reveal.
  - Every Round 1-3 turn ends with a "Verdict:" line.
  - Judge filled all Final Verdict fields (best argument, biggest risk, key tradeoff, consensus, recommendation, confidence, next 3 actions).
  - Recommendation is committed; conditional only with an explicit "unless Y" deciding variable.
  - No generic "more scalable"/"more reliable" claims without a named dimension and number.
  - If the topic referenced a repo/path, Context states what exists and what doesn't.
  - If an architecture/design topic, the ADR snippet is included.
